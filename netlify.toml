[[redirects]]
  from = "/service/vollfolierung"
  to = "/vollfolierung-berlin"
  status = 301
  force = true

[[redirects]]
  from = "/service/scheibentoenung"
  to = "/scheibentoenung-berlin"
  status = 301
  force = true

[[redirects]]
  from = "/service/lackschutz"
  to = "/lackschutzfolie-berlin"
  status = 301
  force = true

[[redirects]]
  from = "/service/designfolierung"
  to = "/autofolierung-berlin#teilfolierung"
  status = 301
  force = true

[[redirects]]
  from = "/service/chromfolierung"
  to = "/autofolierung-berlin#chromfolierung"
  status = 301
  force = true

[[redirects]]
  from = "/service/firmenwerbung"
  to = "/fahrzeugbeschriftung-berlin"
  status = 301
  force = true

[[redirects]]
  from = "/leistungen"
  to = "/autofolierung-berlin"
  status = 301
  force = true

# SPA fallback for non-prerendered routes only
[[redirects]]
  from = "/admin"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/admin/*"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/404"
  to = "/404.html"
  status = 404

[[redirects]]
  from = "/*"
  to = "/404.html"
  status = 404

[[headers]]
  for = "/admin"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"

[[headers]]
  for = "/admin/*"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"
